name: Update World Cup data

on:
  schedule:
    # 每 10 分钟一次(cron 用 UTC;GitHub 的定时是"尽力而为",高峰期可能延迟几分钟)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}        # 支持手动触发
  push:
    branches: [ main ]         # 推代码时也跑一次,顺便首发部署

permissions:
  contents: write              # 提交 matches.json
  pages: write                 # 部署 Pages
  id-token: write

concurrency:
  group: worldcup-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest matches
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}   # 可选,没有就不出胜率
          DISPLAY_TZ: America/Vancouver
        run: node scripts/fetch-matches.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --staged --quiet || git commit -m "chore: refresh match data [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                # 整个仓库根目录(含 worldcup-kanban.html 和 data/)

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
